name = "admin-backend-3-api-hono"
main = "src/index.ts"
compatibility_date = "2026-07-02"
# Cloudflare Workers 兼容性标志（必须在顶层，写进 [vars] 段不生效）
compatibility_flags = ["nodejs_compat"]
account_id = "eff602d8715ddb9bcf1b4ba8b2ca0788"

# wrangler.toml (wrangler v3.88.0^)
[observability.logs]
enabled = true

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://admin3.9shi.cc"

# 本地开发时使用SQLite，部署时将使用D1
[[d1_databases]]
binding = "DB"
database_name = "admin-template-small-db"
database_id = "0d4b3f53-5450-4c4c-8a4f-5621c86e5e77"

# Worker 自定义域（自动管理 DNS 与证书）
[[routes]]
pattern = "api3.9shi.cc"
custom_domain = true
